<div class="dropdown-container mt-3">
    <h3 class="mb-4 text-center">Role Master</h3>

    <form>
        <!-- Role Dropdown -->
        <div class="mb-3">
            <label class="form-label">Role Name</label>
            <input type="text" class="form-control" placeholder="Enter Role Name" name="rolename" [(ngModel)]="roleName" [disabled]="isLoading">
        </div>

        <button type="button" class="btn btn-primary w-100" (click)="save()" [disabled]="isLoading">
            <span *ngIf="isLoading"><i class="fa fa-spinner fa-spin me-2"></i>{{ isEditMode ? 'Updating...' : 'Saving...' }}</span>
            <span *ngIf="!isLoading">{{ isEditMode ? 'Update' : 'Save' }}</span>
        </button>
    </form>
</div>
<div class="card shadow-sm mt-5">
    <div class="card-header bg-secondary text-white">
        <h4 class="mb-0"><i class="fa fa-list me-2"></i>Existing Roles</h4>
    </div>
    <div class="card-body table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Role Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let role of RoleList">
                    <td>{{role.roleName}}</td>
                    <td>
                        <button *ngIf="role.roleName !== 'Admin'" (click)="Edit(role)" class="btn btn-warning btn-sm me-2" title="Edit">
                            <i class="fa fa-pencil-alt"></i>
                        </button>
                        <button *ngIf="role.roleName !== 'Admin'" (click)="delete(role.roleId)" class="btn btn-danger btn-sm me-2" title="Delete">
                            <i class="fa fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
