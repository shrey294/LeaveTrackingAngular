<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-5 text-center">

          <!-- App Title -->
          <h2 class="fw-bold mb-2 text-primary">Leave Tracker</h2>
          <p class="text-muted mb-5">Employee Leave Management System</p>

          <!-- Login Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email -->
            <div class="mb-4 text-start">
              <label class="form-label fw-medium">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="fa-solid fa-user"></i>
                </span>
                <input
                  type="text"
                  class="form-control form-control-lg border-start-0"
                  placeholder="Enter your username"
                  formControlName="username"
                />
              </div>
              <small class="text-danger" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
                 username is required
              </small>
            </div>

            <!-- Password -->
            <div class="mb-4 text-start">
              <label class="form-label fw-medium">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="fa-solid fa-lock"></i>
                </span>
                <input
                  type="password"
                  class="form-control form-control-lg border-start-0"
                  placeholder="Enter your password"
                  formControlName="password"
                />
              </div>
              <small class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                Password is required
              </small>
            </div>

            <!-- Remember -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <!-- <div class="form-check">
                <input class="form-check-input" type="checkbox" formControlName="rememberMe">
                <label class="form-check-label">Remember me</label>
              </div> -->
              <a routerLink="/forgotpassword" class="text-decoration-none small text-primary">Forgot password?</a>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">
              
              <ng-container *ngIf="!isloading; else loadingTpl">
                Sign In
              </ng-container>
              <ng-template #loadingTpl>
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                Loading...
              </ng-template>
            </button>

            

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
