<div class="forgot-container">
    <div class="forgot-card text-center">
    <h4 class="forgot-title">Forgot Password?</h4>
    <p class="forgot-subtext">
      Enter your email address and we’ll send you a reset link.
    </p>

    <form>
      <div class="mb-3 text-start">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" requiredname="email" [(ngModel)]="email"  />
      </div>

      <button type="submit" class="btn btn-primary btn-send" (click)="sendResetLink()">
        
        <span *ngIf="isLoading"><i class="fa fa-spinner fa-spin me-2"></i>Sending....</span>
        <span *ngIf="!isLoading">Send Mail</span>
      </button>
    </form>

    <div class="mt-3">
      <a routerLink="/" style="cursor: pointer;" class="text-decoration-none">Back to Login</a>
    </div>
  </div>
</div>
