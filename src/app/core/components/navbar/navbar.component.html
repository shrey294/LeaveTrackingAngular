<nav class="top-navbar">
  <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
    <i class="fa fa-bars"></i>
  </button>
  <div class="navbar-right">
    <div class="notification-wrapper" (click)="toggleNotifications()">
      <i class="fa fa-bell"></i>
      <span class="notif-badge" *ngIf="unreadCount() > 0">{{unreadCount()}}</span>
    </div>
  </div>
</nav>

<div class="notif-backdrop" *ngIf="showNotifications" (click)="showNotifications = false"></div>

<div class="notif-panel" [class.open]="showNotifications">
  <div class="notif-panel-header">
    <div class="notif-title-row">
      <span class="notif-title">Notifications</span>
      <span class="notif-count-badge" *ngIf="unreadCount() > 0">{{unreadCount()}}</span>
    </div>
    <span class="notif-clear" (click)="markAllRead()">Mark all read</span>
  </div>

  <div class="notif-list">
    <div *ngIf="notifications().length === 0" class="notif-empty">
      <i class="fa fa-bell-slash"></i>
      <p>No notifications yet</p>
    </div>

    <div
      *ngFor="let n of notifications()"
      class="notif-item"
      [class.unread]="!n.isRead"
      (click)="markRead(n)">

      <!-- Avatar -->
      <div class="notif-avatar" [ngClass]="getAvatarClass(n.notificationType)">
        {{ getInitials(n.senderUserName) }}
      </div>

      <!-- Body -->
      <div class="notif-body">
        <div class="notif-top">
          <span class="notif-sender">{{ n.senderUserName }}</span>
          <span class="notif-date">{{ n.createdDate | date:'dd-MM-yyyy HH:mm' }}</span>
        </div>
        <span class="notif-type-pill" [ngClass]="getPillClass(n.notificationType)">
          {{ getTypeLabel(n.notificationType) }}
        </span>
        <div class="notif-msg">{{ n.message }}</div>
      </div>

      <!-- Unread dot -->
      <div class="unread-dot" *ngIf="!n.isRead"></div>
    </div>
  </div>

  <div class="notif-footer">
    <span>View all notifications</span>
    <i class="fa fa-arrow-right"></i>
  </div>
</div>
